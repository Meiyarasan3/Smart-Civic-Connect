<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Civic Connect</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="brand-header">
                <div class="logo-text">CIVIC CONNECT</div>
            </div>
            <h1>Welcome Back</h1>
            <p class="subtitle">Sign in to your account</p>

            <div id="alertBox"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Sign In</button>
            </form>

            <p class="text-center mt-2 text-sm">
                Don't have an account? <a href="/register.html" style="color:var(--navy); font-weight:600;">Register</a>
            </p>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        // Redirect if already logged in
        if (isLoggedIn()) {
            const role = getUserRole();
            if (role === 'CITIZEN') window.location.href = '/citizen-dashboard.html';
            else if (role === 'ADMIN') window.location.href = '/admin-dashboard.html';
            else if (role === 'DEPARTMENT') window.location.href = '/dept-dashboard.html';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.textContent = 'Signing in...';
            btn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const result = await loginUser(email, password);

                if (result.success) {
                    saveAuth(result.data);
                    const role = result.data.role;
                    if (role === 'CITIZEN') window.location.href = '/citizen-dashboard.html';
                    else if (role === 'ADMIN') window.location.href = '/admin-dashboard.html';
                    else if (role === 'DEPARTMENT') window.location.href = '/dept-dashboard.html';
                } else {
                    showAlert(document.getElementById('alertBox'), result.message);
                }
            } catch (err) {
                showAlert(document.getElementById('alertBox'), 'Connection failed. Is the server running?');
            }

            btn.textContent = 'Sign In';
            btn.disabled = false;
        }
    </script>
</body>
</html>
