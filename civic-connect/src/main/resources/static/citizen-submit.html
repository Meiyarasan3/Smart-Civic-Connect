<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Complaint — Civic Connect</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="navbar"></div>

    <div class="page-container" style="max-width:650px;">
        <div class="page-header">
            <h2>Submit New Complaint</h2>
        </div>

        <div id="alertBox"></div>

        <div class="card">
            <form id="complaintForm" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label for="title">Complaint Title *</label>
                    <input type="text" id="title" class="form-control"
                           placeholder="e.g., Broken road near bus stop" required maxlength="200">
                </div>

                <div class="form-group">
                    <label for="category">Category *</label>
                    <select id="category" class="form-control" required>
                        <option value="">— Select Category —</option>
                        <option value="ROAD_DAMAGE">Road Damage</option>
                        <option value="GARBAGE">Garbage</option>
                        <option value="WATER_SUPPLY">Water Supply</option>
                        <option value="STREET_LIGHT">Street Light</option>
                        <option value="DRAINAGE">Drainage</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">Description *</label>
                    <textarea id="description" class="form-control" rows="5"
                              placeholder="Describe the issue in detail — what you saw, how long it's been, any risks..."
                              required></textarea>
                </div>

                <div class="form-group">
                    <label for="location">Location</label>
                    <input type="text" id="location" class="form-control"
                           placeholder="e.g., Near Gandhi Statue, Main Road, Karur">
                </div>

                <div class="form-group">
                    <label for="imageUrl">Image URL (Optional)</label>
                    <input type="url" id="imageUrl" class="form-control"
                           placeholder="https://example.com/photo.jpg">
                    <small class="text-muted text-sm">Paste a direct image link if you have one</small>
                </div>

                <div class="flex-gap" style="margin-top:1.25rem;">
                    <button type="submit" class="btn btn-gold" id="submitBtn">Submit Complaint</button>
                    <a href="/citizen-dashboard.html" class="btn btn-outline">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        if (!requireAuth(['CITIZEN'])) throw 'redirect';
        renderNavbar('submit');

        async function handleSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const alertBox = document.getElementById('alertBox');

            btn.textContent = 'Submitting...';
            btn.disabled = true;

            const body = {
                title:       document.getElementById('title').value.trim(),
                category:    document.getElementById('category').value,
                description: document.getElementById('description').value.trim(),
                location:    document.getElementById('location').value.trim(),
                imageUrl:    document.getElementById('imageUrl').value.trim() || null
            };

            try {
                const result = await api.post('/complaints/submit', body);

                if (result.success) {
                    showAlert(alertBox, 'Complaint submitted successfully! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/complaint-detail.html?id=' + result.data.complaintId;
                    }, 1500);
                } else {
                    showAlert(alertBox, result.message);
                }
            } catch (err) {
                showAlert(alertBox, 'Failed to submit. Please try again.');
            }

            btn.textContent = 'Submit Complaint';
            btn.disabled = false;
        }
    </script>
</body>
</html>
