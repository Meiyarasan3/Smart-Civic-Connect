<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Dashboard — Civic Connect</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="navbar"></div>

    <div class="page-container">
        <div class="page-header">
            <h2>Assigned Complaints</h2>
        </div>

        <div id="alertBox"></div>

        <div id="complaintsArea">
            <p class="text-muted text-center">Loading...</p>
        </div>
    </div>

    <!-- Update Status Modal -->
    <div id="updateModal" class="modal-overlay hidden" onclick="closeModal(event)">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h3>Update Complaint Status</h3>
            <p id="updateInfo" class="text-muted text-sm"></p>

            <div id="modalAlert"></div>

            <div class="form-group">
                <label for="newStatus">New Status</label>
                <select id="newStatus" class="form-control">
                    <option value="IN_PROGRESS">In Progress</option>
                    <option value="RESOLVED">Resolved</option>
                </select>
            </div>

            <div class="form-group">
                <label for="remarks">Remarks</label>
                <textarea id="remarks" class="form-control" rows="3"
                          placeholder="Describe what has been done..."></textarea>
            </div>

            <div class="form-group">
                <label for="proofUrl">Proof Image URL (Optional)</label>
                <input type="url" id="proofUrl" class="form-control"
                       placeholder="https://example.com/proof-photo.jpg">
            </div>

            <div class="flex-gap" style="margin-top:1rem;">
                <button class="btn btn-gold" onclick="submitUpdate()">Update Status</button>
                <button class="btn btn-outline" onclick="hideModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        if (!requireAuth(['DEPARTMENT'])) throw 'redirect';
        renderNavbar('dashboard');

        let updatingComplaintId = null;

        loadAssigned();

        async function loadAssigned() {
            try {
                const result = await api.get('/department/complaints');

                if (!result.success) {
                    showAlert(document.getElementById('alertBox'), result.message);
                    return;
                }

                const complaints = result.data;

                if (complaints.length === 0) {
                    document.getElementById('complaintsArea').innerHTML =
                        '<div class="empty-state"><p>No complaints assigned to you yet.</p></div>';
                    return;
                }

                // Stats summary
                const active = complaints.filter(c => ['ASSIGNED','IN_PROGRESS','REOPENED'].includes(c.status)).length;
                const resolved = complaints.filter(c => ['RESOLVED','VERIFIED'].includes(c.status)).length;

                let html = `
                <div class="stats-grid" style="margin-bottom:1.25rem;">
                    <div class="stat-card">
                        <div class="stat-value">${complaints.length}</div>
                        <div class="stat-label">Total Assigned</div>
                    </div>
                    <div class="stat-card in-progress">
                        <div class="stat-value">${active}</div>
                        <div class="stat-label">Active</div>
                    </div>
                    <div class="stat-card resolved">
                        <div class="stat-value">${resolved}</div>
                        <div class="stat-label">Resolved</div>
                    </div>
                </div>`;

                // Complaints table
                html += '<div class="card" style="padding:0; overflow-x:auto;">';
                html += `<table class="complaint-table">
                    <thead><tr>
                        <th>ID</th><th>Title</th><th>Category</th><th>Location</th><th>Status</th><th>Date</th><th>Action</th>
                    </tr></thead><tbody>`;

                complaints.forEach(c => {
                    const canUpdate = ['ASSIGNED', 'IN_PROGRESS', 'REOPENED'].includes(c.status);
                    html += `<tr>
                        <td>#${c.complaintId}</td>
                        <td class="title-cell" onclick="window.location='/complaint-detail.html?id=${c.complaintId}'">${c.title}</td>
                        <td>${formatCategory(c.category)}</td>
                        <td class="text-sm">${c.location || '—'}</td>
                        <td><span class="status-badge status-${c.status}">${formatStatus(c.status)}</span></td>
                        <td class="text-sm text-muted">${formatDate(c.createdAt)}</td>
                        <td>
                            ${canUpdate ?
                                `<button class="btn btn-gold btn-sm" onclick="openUpdateModal(${c.complaintId}, '${c.title}')">Update</button>` :
                                `<button class="btn btn-outline btn-sm" onclick="window.location='/complaint-detail.html?id=${c.complaintId}'">View</button>`
                            }
                        </td>
                    </tr>`;
                });

                html += '</tbody></table></div>';
                document.getElementById('complaintsArea').innerHTML = html;

            } catch (err) {
                showAlert(document.getElementById('alertBox'), 'Failed to load complaints');
            }
        }

        function openUpdateModal(id, title) {
            updatingComplaintId = id;
            document.getElementById('updateInfo').textContent = `Complaint #${id}: ${title}`;
            document.getElementById('newStatus').value = 'IN_PROGRESS';
            document.getElementById('remarks').value = '';
            document.getElementById('proofUrl').value = '';
            document.getElementById('updateModal').classList.remove('hidden');
        }

        function hideModal() {
            document.getElementById('updateModal').classList.add('hidden');
            updatingComplaintId = null;
        }

        function closeModal(e) {
            if (e.target === document.getElementById('updateModal')) hideModal();
        }

        async function submitUpdate() {
            const status   = document.getElementById('newStatus').value;
            const remarks  = document.getElementById('remarks').value.trim();
            const proofUrl = document.getElementById('proofUrl').value.trim();
            const modalAlert = document.getElementById('modalAlert');

            if (!remarks) {
                showAlert(modalAlert, 'Please add remarks about your work');
                return;
            }

            const body = {
                status: status,
                remarks: remarks,
                proofImageUrl: proofUrl || null
            };

            try {
                const result = await api.put('/department/complaints/' + updatingComplaintId + '/update', body);
                if (result.success) {
                    hideModal();
                    showAlert(document.getElementById('alertBox'), 'Status updated successfully!', 'success');
                    loadAssigned(); // Refresh the list
                } else {
                    showAlert(modalAlert, result.message);
                }
            } catch (err) {
                showAlert(modalAlert, 'Update failed');
            }
        }
    </script>
</body>
</html>
