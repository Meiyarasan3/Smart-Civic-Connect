<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Civic Connect</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="navbar"></div>

    <div class="page-container">
        <div class="page-header">
            <h2>Admin Dashboard</h2>
        </div>

        <div id="alertBox"></div>

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-value" id="statTotal">—</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-card submitted">
                <div class="stat-value" id="statSubmitted">—</div>
                <div class="stat-label">Submitted</div>
            </div>
            <div class="stat-card assigned">
                <div class="stat-value" id="statAssigned">—</div>
                <div class="stat-label">Assigned</div>
            </div>
            <div class="stat-card in-progress">
                <div class="stat-value" id="statInProgress">—</div>
                <div class="stat-label">In Progress</div>
            </div>
            <div class="stat-card resolved">
                <div class="stat-value" id="statResolved">—</div>
                <div class="stat-label">Resolved</div>
            </div>
            <div class="stat-card verified">
                <div class="stat-value" id="statVerified">—</div>
                <div class="stat-label">Verified</div>
            </div>
            <div class="stat-card reopened">
                <div class="stat-value" id="statReopened">—</div>
                <div class="stat-label">Reopened</div>
            </div>
        </div>

        <!-- Recent (5) -->
        <h3 style="color:var(--navy); margin-bottom:0.75rem;">Recent Complaints</h3>
        <div id="complaintsArea">
            <p class="text-muted text-center">Loading...</p>
        </div>

        <p class="text-center mt-1">
            <a href="/admin-complaints.html" style="color:var(--navy); font-weight:600;">View & manage all complaints →</a>
        </p>
    </div>

    <script src="/js/app.js"></script>
    <script>
        if (!requireAuth(['ADMIN'])) throw 'redirect';
        renderNavbar('dashboard');

        loadAdminDashboard();

        async function loadAdminDashboard() {
            try {
                // Load stats
                const statsRes = await api.get('/admin/stats');
                if (statsRes.success) {
                    const s = statsRes.data;
                    document.getElementById('statTotal').textContent = s.total;
                    document.getElementById('statSubmitted').textContent = s.submitted;
                    document.getElementById('statAssigned').textContent = s.assigned;
                    document.getElementById('statInProgress').textContent = s.inProgress;
                    document.getElementById('statResolved').textContent = s.resolved;
                    document.getElementById('statVerified').textContent = s.verified;
                    document.getElementById('statReopened').textContent = s.reopened;
                }

                // Load recent complaints
                const compRes = await api.get('/admin/complaints');
                if (compRes.success) {
                    const complaints = compRes.data.slice(0, 5);
                    if (complaints.length === 0) {
                        document.getElementById('complaintsArea').innerHTML =
                            '<div class="empty-state"><p>No complaints yet.</p></div>';
                        return;
                    }

                    let html = '<div class="card" style="padding:0; overflow-x:auto;">';
                    html += `<table class="complaint-table">
                        <thead><tr>
                            <th>ID</th><th>Title</th><th>Citizen</th><th>Category</th><th>Status</th><th>Date</th>
                        </tr></thead><tbody>`;

                    complaints.forEach(c => {
                        html += `<tr onclick="window.location='/complaint-detail.html?id=${c.complaintId}'" style="cursor:pointer;">
                            <td>#${c.complaintId}</td>
                            <td class="title-cell">${c.title}</td>
                            <td class="text-sm">${c.citizenName}</td>
                            <td>${formatCategory(c.category)}</td>
                            <td><span class="status-badge status-${c.status}">${formatStatus(c.status)}</span></td>
                            <td class="text-sm text-muted">${formatDate(c.createdAt)}</td>
                        </tr>`;
                    });

                    html += '</tbody></table></div>';
                    document.getElementById('complaintsArea').innerHTML = html;
                }

            } catch (err) {
                showAlert(document.getElementById('alertBox'), 'Failed to load dashboard');
            }
        }
    </script>
</body>
</html>
