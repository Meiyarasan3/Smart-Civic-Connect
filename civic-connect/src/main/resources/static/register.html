<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Civic Connect</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="brand-header">
                <div class="logo-text">CIVIC CONNECT</div>
            </div>
            <h1>Create Account</h1>
            <p class="subtitle">Register to report and track civic issues</p>

            <div id="alertBox"></div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number (Optional)</label>
                    <input type="tel" id="phone" class="form-control" placeholder="9876543210">
                </div>
                <div class="form-group">
                    <label for="role">Register As</label>
                    <select id="role" class="form-control">
                        <option value="CITIZEN">Citizen</option>
                        <option value="ADMIN">Admin Officer</option>
                        <option value="DEPARTMENT">Department Officer</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Minimum 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="regBtn">Create Account</button>
            </form>

            <p class="text-center mt-2 text-sm">
                Already have an account? <a href="/login.html" style="color:var(--navy); font-weight:600;">Sign In</a>
            </p>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        if (isLoggedIn()) window.location.href = '/';

        async function handleRegister(e) {
            e.preventDefault();
            const alertBox = document.getElementById('alertBox');
            const btn = document.getElementById('regBtn');

            const name     = document.getElementById('name').value.trim();
            const email    = document.getElementById('email').value.trim();
            const phone    = document.getElementById('phone').value.trim();
            const role     = document.getElementById('role').value;
            const password = document.getElementById('password').value;
            const confirm  = document.getElementById('confirmPassword').value;

            if (password !== confirm) {
                showAlert(alertBox, 'Passwords do not match');
                return;
            }

            btn.textContent = 'Creating account...';
            btn.disabled = true;

            try {
                const result = await registerUser(name, email, password, phone, role);

                if (result.success) {
                    saveAuth(result.data);
                    const r = result.data.role;
                    if (r === 'CITIZEN') window.location.href = '/citizen-dashboard.html';
                    else if (r === 'ADMIN') window.location.href = '/admin-dashboard.html';
                    else if (r === 'DEPARTMENT') window.location.href = '/dept-dashboard.html';
                } else {
                    showAlert(alertBox, result.message);
                }
            } catch (err) {
                showAlert(alertBox, 'Connection failed. Is the server running?');
            }

            btn.textContent = 'Create Account';
            btn.disabled = false;
        }
    </script>
</body>
</html>
