# ============================================
# Civic Connect - Application Configuration
# ============================================

spring.application.name=civic-connect

# ---- MySQL Database ----
spring.datasource.url=jdbc:mysql://localhost:3306/civic_connect_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=Mei_@001
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---- Server ----
server.port=8080

# ---- File Upload ----
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=uploads

# ---- JWT ----
jwt.secret=CivicConnectSecretKeyForJWTTokenGeneration2024MakeThisLongerInProduction
jwt.expiration=86400000
